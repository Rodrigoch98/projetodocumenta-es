<!DOCTYPE html>
<!--
  Central de Documentação — Rodrigo / Lince Tech
  App de página única (HTML+JS) sincronizado com Firebase Realtime Database.

  >>> IMPORTANTE (LEIA UMA VEZ) <<<
  1) Este app roda no NAVEGADOR e usa APENAS o Realtime Database. Por isso basta a
     "databaseURL" no bloco CONFIG abaixo. O trecho que você tinha (firebase-admin +
     serviceAccountKey.json) é do SERVIDOR (Node) e NUNCA deve ir para um arquivo HTML,
     pois a chave de serviço é secreta.
  2) Para o app conseguir gravar, ajuste as Regras do Realtime Database no Console:
       Realtime Database > Regras:
       { "rules": { ".read": true, ".write": true } }
     Isso deixa a base ABERTA (bom para começar). Como aqui há dados de processos de DP,
     depois vale proteger (Firebase Auth ou manter a URL privada). Há um lembrete na aba Ajuda.
  3) Os dados ficam no Firebase e também têm cópia local de segurança no navegador.
     Use o botão "Fazer backup (JSON)" na aba Ajuda de tempos em tempos.
-->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Central de Documentação</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#f2f3f5; --surface:#ffffff; --surface2:#f6f7f9; --ink:#23272e; --muted:#6b7280;
  --line:#e4e7ec; --primary:#c4122e; --primary-2:#9c0e24; --primary-ink:#ffffff;
  --brand-soft:#fdeaed; --accent:#3a4048; --accent-soft:#eceef1;
  --warn:#b8721c; --warn-soft:#fbf0dc; --danger:#c4122e; --danger-soft:#fbe4e6; --ok:#1f9d6b; --ok-soft:#e2f5ec;
  --shadow:0 1px 2px rgba(20,20,25,.06),0 6px 20px rgba(20,20,25,.07); --radius:14px;
}
[data-theme="dark"]{
  --bg:#0f1216; --surface:#171b21; --surface2:#1e232b; --ink:#e8eaed; --muted:#9aa3b0;
  --line:#2a2f37; --primary:#ec5b6b; --primary-2:#c4122e; --primary-ink:#1a0d10;
  --brand-soft:#2c1418; --accent:#aeb6c2; --accent-soft:#252b34;
  --warn:#e2a94a; --warn-soft:#2e2513; --danger:#f0737d; --danger-soft:#2e181b; --ok:#4bcc95; --ok-soft:#12271f;
  --shadow:0 1px 2px rgba(0,0,0,.35),0 8px 26px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:"Segoe UI",Roboto,system-ui,-apple-system,Arial,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--primary)}
button{font-family:inherit;font-size:14px;cursor:pointer;border:0}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 11px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 22%,transparent)}
textarea{resize:vertical;min-height:80px;line-height:1.55}
label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:0 0 5px}
.field{margin-bottom:13px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.muted{color:var(--muted)}
.small{font-size:12.5px}
.center{text-align:center}
.hidden{display:none!important}

/* layout */
.app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
.sidebar{background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:16px 16px 12px;display:flex;gap:11px;align-items:center;border-bottom:1px solid var(--line)}
.brand .logo{width:46px;height:46px;flex:none;display:grid;place-items:center}
.brand .logo img{width:46px;height:46px;object-fit:contain}
.brand b{display:block;font-size:14.5px;letter-spacing:.2px;line-height:1.15}
.brand span{font-size:11px;color:var(--muted)}
.brand .kbrand{color:var(--primary);font-weight:700}
.nav{padding:10px 10px;display:flex;flex-direction:column;gap:3px;overflow:auto}
.nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;color:var(--ink);padding:10px 12px;border-radius:10px;font-weight:600}
.nav button .ic{width:22px;text-align:center;font-size:16px}
.nav button .ct{margin-left:auto;background:var(--surface2);color:var(--muted);border:1px solid var(--line);border-radius:20px;font-size:11px;padding:0 8px;line-height:18px;min-width:20px;text-align:center}
.nav button:hover{background:var(--surface2)}
.nav button.active{background:color-mix(in srgb,var(--primary) 12%,transparent);color:var(--primary)}
.nav button.active .ic{filter:none}
.side-foot{margin-top:auto;padding:12px;border-top:1px solid var(--line);font-size:11.5px}
.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:11px 20px}
.topbar h1{font-size:17px;margin:0;font-weight:700}
.topbar .sub{font-size:12px;color:var(--muted)}
.spacer{flex:1}
.content{padding:20px;max-width:1180px;width:100%;margin:0 auto}

/* pills / badges / buttons */
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid var(--line);background:var(--surface2);color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block}
.dot.on{background:var(--ok)} .dot.off{background:var(--danger)}
.badge{display:inline-block;font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:20px}
.b-ide{background:var(--surface2);color:var(--muted)}
.b-col{background:var(--brand-soft);color:var(--primary)}
.b-ras{background:var(--accent-soft);color:var(--accent)}
.b-val{background:var(--warn-soft);color:var(--warn)}
.b-pub{background:var(--ok-soft);color:var(--ok)}
.b-ok{background:var(--ok-soft);color:var(--ok)} .b-warn{background:var(--warn-soft);color:var(--warn)} .b-danger{background:var(--danger-soft);color:var(--danger)}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--surface);color:var(--ink);border:1px solid var(--line);padding:9px 14px;border-radius:10px;font-weight:600}
.btn:hover{background:var(--surface2)}
.btn.primary{background:var(--primary);color:var(--primary-ink);border-color:transparent}
.btn.primary:hover{filter:brightness(1.06)}
.btn.accent{background:var(--accent);color:#fff;border-color:transparent}
.btn.ghost{background:transparent}
.btn.sm{padding:6px 10px;font-size:13px}
.btn.danger{color:var(--danger);border-color:color-mix(in srgb,var(--danger) 35%,var(--line))}
.btn.danger:hover{background:var(--danger-soft)}
.iconbtn{background:transparent;border:1px solid var(--line);border-radius:9px;width:34px;height:34px;display:grid;place-items:center;color:var(--muted)}
.iconbtn:hover{background:var(--surface2);color:var(--ink)}

/* cards / grids */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.p{padding:16px}
.grid{display:grid;gap:14px}
.g-kpi{grid-template-columns:repeat(auto-fit,minmax(165px,1fr))}
.kpi{padding:15px 16px}
.kpi .n{font-size:28px;font-weight:800;letter-spacing:-.5px}
.kpi .l{font-size:12.5px;color:var(--muted);font-weight:600}
.kpi .foot{font-size:11.5px;margin-top:4px}
.section-h{display:flex;align-items:center;gap:10px;margin:22px 0 12px}
.section-h h2{font-size:15.5px;margin:0}
.section-h .line{flex:1;height:1px;background:var(--line)}
.list{display:flex;flex-direction:column;gap:10px}
.item{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
.item .t{font-weight:700}
.hoverable:hover{border-color:color-mix(in srgb,var(--primary) 40%,var(--line))}
.tag{display:inline-block;font-size:11.5px;color:var(--muted);background:var(--surface2);border:1px solid var(--line);padding:1px 8px;border-radius:7px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.toolbar .search{flex:1;min-width:180px;max-width:360px}
.empty{border:1.5px dashed var(--line);border-radius:14px;padding:30px 20px;text-align:center;color:var(--muted)}
.empty .big{font-size:30px;margin-bottom:6px}

/* kanban */
.kanban{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(240px,1fr);gap:12px;overflow-x:auto;padding-bottom:6px}
.col{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:10px;min-height:120px}
.col.drop{outline:2px dashed var(--primary);outline-offset:-4px}
.col-h{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;margin:2px 4px 10px}
.col-h .c{margin-left:auto;font-size:11.5px;color:var(--muted)}
.kcard{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:9px;box-shadow:var(--shadow);cursor:grab}
.kcard:active{cursor:grabbing}
.kcard .kt{font-weight:700;font-size:14px}
.kcard .meta{font-size:12px;color:var(--muted);margin-top:5px;display:flex;gap:8px;flex-wrap:wrap}

/* table */
.table{width:100%;border-collapse:collapse;font-size:14px}
.table th{text-align:left;font-size:12px;color:var(--muted);font-weight:700;padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
.table td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top}
.table tr:last-child td{border-bottom:0}
.table tr.hoverable:hover td{background:var(--surface2)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(12,18,28,.5);backdrop-filter:blur(2px);display:grid;place-items:center;padding:18px;z-index:60}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:16px;width:640px;max-width:100%;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.modal-h{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line)}
.modal-h b{font-size:16px}
.modal-b{padding:18px;overflow:auto}
.modal-f{display:flex;gap:10px;justify-content:flex-end;padding:14px 18px;border-top:1px solid var(--line)}

/* toast */
.toasts{position:fixed;right:16px;bottom:16px;display:flex;flex-direction:column;gap:8px;z-index:90}
.toast{background:var(--ink);color:var(--bg);padding:11px 15px;border-radius:11px;font-size:13.5px;box-shadow:0 8px 24px rgba(0,0,0,.3);max-width:340px}
[data-theme="dark"] .toast{background:var(--surface);color:var(--ink);border:1px solid var(--line)}

/* modo reunião */
.mr-wrap{display:grid;grid-template-columns:1.15fr .85fr;gap:16px}
.mr-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.timer{font-variant-numeric:tabular-nums;font-weight:800;font-size:18px;background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:6px 12px}
.phase{margin-bottom:14px}
.phase-h{display:flex;align-items:center;gap:9px;font-weight:800;font-size:13px;letter-spacing:.3px;color:var(--primary);margin:0 0 8px;text-transform:uppercase}
.phase-h .k{width:26px;height:26px;border-radius:8px;background:color-mix(in srgb,var(--primary) 14%,transparent);display:grid;place-items:center;font-size:13px}
.rit{display:flex;gap:10px;padding:9px 10px;border:1px solid var(--line);border-radius:10px;margin-bottom:7px;background:var(--surface)}
.rit.done{background:var(--ok-soft);border-color:color-mix(in srgb,var(--ok) 30%,var(--line))}
.rit input[type=checkbox]{width:18px;height:18px;margin-top:2px;accent-color:var(--accent);flex:none}
.rit .rtx{font-size:13.5px}
.rit .rdica{font-size:12px;color:var(--muted);margin-top:3px;font-style:italic}
.rit .rnote{margin-top:8px}
.checklist{margin-top:8px;display:flex;flex-direction:column;gap:5px}
.cl-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;padding:6px 9px;border:1px solid var(--line);border-radius:9px;background:var(--surface2)}
.cl-item.on{background:var(--ok-soft);border-color:color-mix(in srgb,var(--ok) 30%,var(--line))}
.cl-item>input[type=checkbox]{width:16px;height:16px;margin-top:2px;accent-color:var(--primary);flex:none}
.cl-item span.tx{flex:1;line-height:1.42}
.cl-item.on span.tx{text-decoration:line-through;color:var(--muted)}
.cl-item .mine{font-size:9.5px;font-weight:800;letter-spacing:.4px;color:var(--primary);background:var(--brand-soft);border-radius:5px;padding:1px 5px;margin-top:1px;flex:none}
.cl-x{margin-left:2px;background:transparent;border:0;color:var(--muted);font-size:17px;line-height:1;cursor:pointer;padding:0 3px;opacity:.55;flex:none}
.cl-x:hover{opacity:1;color:var(--danger)}
.cl-add{display:flex;gap:6px;margin-top:7px}
.cl-add input{flex:1}
.rtx .ct{font-size:11px;font-weight:700;color:var(--muted);background:var(--surface2);border:1px solid var(--line);border-radius:20px;padding:0 8px;margin-left:6px}
.rit.done .rtx .ct{background:var(--ok-soft);color:var(--ok);border-color:transparent}
.mini-h{display:flex;align-items:center;gap:8px;margin:0 0 8px}
.mini-h b{font-size:13.5px}
.mini-h .btn{margin-left:auto}
.qline{display:flex;gap:8px;align-items:flex-start;padding:8px 0;border-bottom:1px dashed var(--line)}
.qline:last-child{border-bottom:0}

/* faixa vermelha de marca no topo */
.topbar{border-top:3px solid var(--primary)}
.brand-strip{height:3px;background:linear-gradient(90deg,var(--primary),var(--primary-2))}

/* perguntas-guia (como perguntar) */
details.guia{margin-top:8px;border-top:1px dashed var(--line);padding-top:7px}
details.guia>summary{cursor:pointer;font-size:12px;font-weight:700;color:var(--primary);list-style:none;user-select:none}
details.guia>summary::-webkit-details-marker{display:none}
details.guia>summary::before{content:"▸ ";font-size:10px}
details.guia[open]>summary::before{content:"▾ "}
details.guia ul{margin:8px 0 2px;padding-left:18px}
details.guia li{font-size:12.5px;color:var(--ink);margin-bottom:4px;line-height:1.45}

/* documento de metodologia */
.doc h2{font-size:16px}
.doc h3{font-size:14px;color:var(--primary);margin:18px 0 6px}
.doc p{margin:8px 0}
.doc ul,.doc ol{padding-left:20px;line-height:1.65}
.doc .fala{background:var(--brand-soft);border-left:3px solid var(--primary);border-radius:0 10px 10px 0;padding:12px 14px;margin:10px 0;font-style:italic}
.doc .callout{background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:10px 0}
.doc .agenda{width:100%;border-collapse:collapse;margin:8px 0}
.doc .agenda td{border:1px solid var(--line);padding:8px 10px;font-size:13.5px}
.doc .agenda td:first-child{white-space:nowrap;font-weight:700;color:var(--primary);width:120px}
.metodo-hero{display:flex;gap:14px;align-items:center;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:6px}
.metodo-hero img{height:52px;width:auto}
.pensar-tag{display:inline-grid;place-items:center;width:26px;height:26px;border-radius:7px;background:var(--brand-soft);color:var(--primary);font-weight:800;font-size:13px}

/* rodapé com marca */
.side-foot .lince{display:block;margin-bottom:8px}
.side-foot .lince img{height:20px;width:auto;opacity:.9}

.print-only{display:none}
@media print{
  .sidebar,.topbar,.no-print{display:none!important}
  .app{display:block} .content{max-width:none;padding:0}
  .card{box-shadow:none;border-color:#ccc}
  body{background:#fff}
}
@media(max-width:900px){
  .mr-wrap{grid-template-columns:1fr}
  .row2{grid-template-columns:1fr}
}
@media(max-width:760px){
  .app{grid-template-columns:1fr}
  .sidebar{position:static;height:auto;flex-direction:column}
  .nav{flex-direction:row;overflow-x:auto;padding:8px}
  .nav button{white-space:nowrap} .nav button .ct{display:none}
  .side-foot{display:none}
  .content{padding:14px}
}
</style>
</head>

/* =======================================================================
   BOOT
   ======================================================================= */
function boot(){
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    fbOK = true;
  }catch(e){
    console.error("Firebase falhou:",e);
    fbOK = false;
    carregarLocal();
    toast("Sem conexão com o Firebase. Rodando com a cópia local.");
  }
  applyTheme(localStorage.getItem("centralDoc_theme")||"light");
  buildNav();
  if(fbOK){
    db.ref(".info/connected").on("value", s=>{ online = !!s.val(); paintConn(); });
    NODES.forEach(n=>{
      db.ref(n).on("value", s=>{
        State[n] = s.val() || {};
        salvarLocal();
        if(n==="reunioes" && currentView==="modoReuniao" && Date.now() < mrSuppressUntil){
          buildNav(); // não re-renderiza a tela para não perder o foco das caixas de texto
        } else {
          renderCurrent();
          buildNav();
        }
      }, err=>{
        console.error("Leitura falhou em "+n, err);
        toast("Erro ao ler '"+n+"'. Verifique as Regras do Realtime Database.");
      });
    });
    seedSeNecessario();
  }else{
    paintConn();
    renderCurrent();
    buildNav();
  }
  go("painel");
}

function paintConn(){
  const dot = document.getElementById("connDot");
  const pill = document.getElementById("connPill");
  if(!fbOK){ dot.className="dot off"; pill.childNodes[1].nodeValue=" cópia local"; return; }
  dot.className = "dot "+(online?"on":"off");
  pill.childNodes[1].nodeValue = online ? " sincronizado" : " reconectando…";
}

/* =======================================================================
   PERSISTÊNCIA
   ======================================================================= */
function ref(p){ return db.ref(p); }
function novoId(){ return fbOK ? db.ref("_k").push().key : "loc-"+Date.now()+"-"+Math.random().toString(36).slice(2,7); }
function agora(){ return Date.now(); }

function criar(node, data){
  const id = novoId();
  data.id = id; data.criadoEm = agora(); data.atualizadoEm = agora();
  if(fbOK){ return ref(node+"/"+id).set(data).then(()=>id); }
  State[node][id]=data; salvarLocal(); renderCurrent(); buildNav(); return Promise.resolve(id);
}
function atualizar(node, id, changes){
  changes.atualizadoEm = agora();
  if(fbOK){ return ref(node+"/"+id).update(changes); }
  Object.assign(State[node][id]||(State[node][id]={id}), changes); salvarLocal(); renderCurrent(); buildNav(); return Promise.resolve();
}
function excluir(node, id){
  if(fbOK){ return ref(node+"/"+id).remove(); }
  delete State[node][id]; salvarLocal(); renderCurrent(); buildNav(); return Promise.resolve();
}
function salvarLocal(){ try{ localStorage.setItem(LOCAL_KEY, JSON.stringify(State)); }catch(e){} }
function carregarLocal(){ try{ const j=localStorage.getItem(LOCAL_KEY); if(j){ const d=JSON.parse(j); NODES.forEach(n=>State[n]=d[n]||{}); } }catch(e){} }

/* helpers de coleção */
function lista(node){ return Object.values(State[node]||{}).sort((a,b)=>(a.criadoEm||0)-(b.criadoEm||0)); }
function get(node,id){ return (State[node]||{})[id]||null; }
function nomePessoa(id){ const p=get("participantes",id); return p?p.nome:"—"; }
function nomeProjeto(id){ const p=get("projetos",id); return p?p.nome:"—"; }
function tituloManual(id){ const m=get("manuais",id); return m?m.titulo:"—"; }

const VIEWS = [
  {id:"painel",    ic:"📊", nome:"Painel",       sub:"Visão geral dos projetos"},
  {id:"projetos",  ic:"📁", nome:"Projetos",     sub:"Iniciativas de documentação"},
  {id:"reunioes",  ic:"📅", nome:"Reuniões",     sub:"Coletas, alinhamentos e validações"},
  {id:"manuais",   ic:"📘", nome:"Manuais",      sub:"Entregas por status (arraste os cartões)"},
  {id:"pendencias",ic:"✅", nome:"Pendências",   sub:"Ações e responsáveis"},
  {id:"pessoas",   ic:"👥", nome:"Pessoas",      sub:"Envolvidos e papéis"},

  {id:"ajuda",     ic:"⚙️", nome:"Ajuda",        sub:"Configuração, backup e dicas"}

function countFor(id){
  if(id==="projetos") return lista("projetos").length;
  if(id==="reunioes") return lista("reunioes").length;
  if(id==="manuais") return lista("manuais").length;
  if(id==="pessoas") return lista("participantes").length;
  if(id==="telas") return lista("telas").length;
  if(id==="pendencias") return lista("pendencias").filter(p=>p.status!=="Concluída").length;
  return null;
}
function buildNav(){
  const nav = document.getElementById("nav");
  nav.innerHTML = VIEWS.map(v=>{
    const c = countFor(v.id);
    return `<button class="${v.id===currentView?'active':''}" onclick="go('${v.id}')">
      <span class="ic">${v.ic}</span><span>${v.nome}</span>${c!=null?`<span class="ct">${c}</span>`:''}</button>`;
  }).join("");
}
function go(id){
  currentView = id; ctx={};
  const v = VIEWS.find(x=>x.id===id)||VIEWS[0];
  document.getElementById("viewTitle").textContent = v.nome;
  document.getElementById("viewSub").textContent = v.sub;
  buildNav(); renderCurrent();
  document.getElementById("view").scrollIntoView({block:"start"});
}
function renderCurrent(){
  const el = document.getElementById("view");
  if(currentView==="modoReuniao"){ el.innerHTML = viewModoReuniao(ctx.reuniaoId); return; }
  const map = {painel:viewPainel,projetos:viewProjetos,reunioes:viewReunioes,manuais:viewManuais,
    pendencias:viewPendencias,pessoas:viewPessoas,telas:viewTelas,metodologia:viewMetodologia,ajuda:viewAjuda};
  el.innerHTML = (map[currentView]||viewPainel)();
}

function viewPainel(){
  const proj = lista("projetos").filter(p=>p.status!=="Arquivado");
  const reun = lista("reunioes");
  const agendadas = reun.filter(r=>r.status==="Agendada");
  const realizadas = reun.filter(r=>r.status==="Realizada");
  const man = lista("manuais");
  const manAtivos = man.filter(m=>m.status!=="Publicado");
  const pend = lista("pendencias").filter(p=>p.status!=="Concluída");
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const atrasadas = pend.filter(p=>p.prazo && new Date(p.prazo) < hoje);
  const prox = agendadas.filter(r=>r.dataHora).sort((a,b)=>a.dataHora-b.dataHora)[0]
            || agendadas.sort((a,b)=>(a.dataHora||0)-(b.dataHora||0))[0];

  let html = `<div class="grid g-kpi">
    ${kpi(proj.length,"Projetos ativos","")}
    ${kpi(agendadas.length,"Reuniões agendadas","")}
    ${kpi(realizadas.length,"Reuniões realizadas","")}
    ${kpi(manAtivos.length,"Manuais em andamento","")}
    ${kpi(pend.length,"Pendências abertas", atrasadas.length? `<span class="badge b-danger">${atrasadas.length} atrasada(s)</span>`:'')}
  </div>`;

  if(prox){
    html += `<div class="section-h"><h2>Próxima reunião</h2><span class="line"></span></div>
    <div class="card p" style="border-left:4px solid var(--accent)">
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
        <div>
          <div class="t" style="font-size:16px;font-weight:700">${esc(prox.titulo)}</div>
          <div class="small muted" style="margin-top:4px">
            ${prox.dataHora?fmtDataHora(prox.dataHora):'sem data'} · ${esc(prox.tipo||'')}
            ${prox.manualId?` · ${esc(tituloManual(prox.manualId))}`:''}
          </div>
          <div class="small muted" style="margin-top:6px">Participantes: ${(prox.participantes||[]).map(nomePessoa).join(", ")||"—"}</div>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px">
          <button class="btn primary" onclick="abrirModoReuniao('${prox.id}')">▶ Entrar no Modo Reunião</button>
          <button class="btn" onclick="formReuniao('${prox.id}')">Editar</button>
        </div>
      </div>
    </div>`;
  }

  // manuais por status
  html += `<div class="section-h"><h2>Manuais por status</h2><span class="line"></span>
    <button class="btn sm" onclick="go('manuais')">Abrir quadro</button></div>
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr))">`;
  STATUS_MANUAL.forEach(s=>{
    const n = man.filter(m=>m.status===s).length;
    html += `<div class="card p center"><div class="kpi" style="padding:0"><div class="n" style="font-size:22px">${n}</div></div><span class="badge ${badgeManual[s]}">${s}</span></div>`;
  });
  html += `</div>`;

  // pendências em destaque
  html += `<div class="section-h"><h2>Pendências abertas</h2><span class="line"></span>
    <button class="btn sm" onclick="go('pendencias')">Ver todas</button></div>`;
  const topPend = pend.sort((a,b)=> (a.prazo? new Date(a.prazo):9e15) - (b.prazo? new Date(b.prazo):9e15)).slice(0,5);
  if(!topPend.length){ html += emptyBox("Nenhuma pendência aberta","Tudo em dia por aqui."); }
  else html += `<div class="list">`+topPend.map(pendItem).join("")+`</div>`;

  return html;
}
function kpi(n,l,foot){ return `<div class="card kpi"><div class="n">${n}</div><div class="l">${l}</div>${foot?`<div class="foot">${foot}</div>`:''}</div>`; }

function novaSubId(){ return "s"+Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function itensDeRoteiro(fonte){
  return fonte.map((it,i)=>{
    const rid="ri"+i+"_"+Math.random().toString(36).slice(2,6);
    return {id:rid, fase:it.fase, titulo:it.titulo||it.texto||"", dica:it.dica||"",
      itens:(it.perguntas||[]).map((q,j)=>({id:rid+"_g"+j, texto:q, feito:false, tipo:"guia"})),
      feito:false, nota:""};
  });
}
function aplicarRoteiro(id, key){
  let fonte=[];
  if(key==="ambos"){ fonte = ROTEIROS.pensar.itens.concat(ROTEIROS.rescisao.itens); }
  else fonte = ROTEIROS[key].itens;
  const roteiro = itensDeRoteiro(fonte);
  atualizar("reunioes",id,{roteiro}).then(()=>toast("Roteiro aplicado ("+roteiro.length+" etapas)."));
}
/* Converte roteiros antigos (com 'texto' ou 'perguntas') para o formato interativo
   com checklist ('itens'), preservando marcações e anotações. Salva uma vez. */
function migrarRoteiro(r){
  if(!r || !Array.isArray(r.roteiro) || !r.roteiro.length) return false;
  const P = ROTEIROS.pensar.itens;
  const casaPensar = r.roteiro.length===P.length;
  let mudou=false;
  r.roteiro.forEach((it,i)=>{
    if(!it.id){ it.id="ri"+i+"_"+Math.random().toString(36).slice(2,6); mudou=true; }
    if(!Array.isArray(it.itens)){
      if(Array.isArray(it.perguntas) && it.perguntas.length){
        it.itens = it.perguntas.map((q,j)=>({id:it.id+"_g"+j, texto:q, feito:false, tipo:"guia"}));
        if(!it.titulo && it.texto) it.titulo=it.texto;
      } else if(casaPensar){
        if(!it.titulo) it.titulo = P[i].titulo;
        if(!it.dica) it.dica = P[i].dica||"";
        it.itens = (P[i].perguntas||[]).map((q,j)=>({id:it.id+"_g"+j, texto:q, feito:false, tipo:"guia"}));
      } else {
        it.itens = [];
      }
      mudou=true;
    }
    if("perguntas" in it){ delete it.perguntas; mudou=true; }
  });
  if(mudou) atualizar("reunioes",r.id,{roteiro:r.roteiro});
  return mudou;
}
function trocarRoteiro(id){
  if(confirm("Trocar o roteiro apaga as marcações e anotações dos itens desta reunião. Continuar?"))
    atualizar("reunioes",id,{roteiro:null});
}
function toggleRoteiro(id,idx){
  const r=get("reunioes",id); if(!r||!r.roteiro||!r.roteiro[idx]) return;
  r.roteiro[idx].feito = !r.roteiro[idx].feito;
  atualizar("reunioes",id,{roteiro:r.roteiro});
}
function toggleSub(id,i,s){
  const r=get("reunioes",id); if(!r||!r.roteiro||!r.roteiro[i]||!Array.isArray(r.roteiro[i].itens)||!r.roteiro[i].itens[s]) return;
  r.roteiro[i].itens[s].feito = !r.roteiro[i].itens[s].feito;
  atualizar("reunioes",id,{roteiro:r.roteiro});
}
function addSub(id,i){
  const el=document.getElementById("add_"+i); const t=(el&&el.value||"").trim(); if(!t){ if(el) el.focus(); return; }
  const r=get("reunioes",id); if(!r||!r.roteiro||!r.roteiro[i]) return;
  if(!Array.isArray(r.roteiro[i].itens)) r.roteiro[i].itens=[];
  r.roteiro[i].itens.push({id:novaSubId(), texto:t, feito:false, tipo:"custom"});
  atualizar("reunioes",id,{roteiro:r.roteiro});
}
function removeSub(ev,id,i,s){
  ev.preventDefault(); ev.stopPropagation();
  const r=get("reunioes",id); if(!r||!r.roteiro||!r.roteiro[i]||!Array.isArray(r.roteiro[i].itens)) return;
  r.roteiro[i].itens.splice(s,1);
  atualizar("reunioes",id,{roteiro:r.roteiro});
}
let notaTimers={};
function notaRoteiro(id,idx,v){
  const r=get("reunioes",id); if(!r||!r.roteiro||!r.roteiro[idx]) return;
  r.roteiro[idx].nota=v;
  mrSuppressUntil = Date.now()+1600;
  clearTimeout(notaTimers["r"+id+idx]);
  notaTimers["r"+id+idx]=setTimeout(()=>atualizar("reunioes",id,{roteiro:r.roteiro}),600);
}
let ataTimer=null;
function salvarAtaDebounce(id,v){
  const s=document.getElementById("ataSaved"); if(s) s.textContent="salvando…";
  mrSuppressUntil = Date.now()+1600;
  clearTimeout(ataTimer);
  ataTimer=setTimeout(()=>{ atualizar("reunioes",id,{notas:v}).then(()=>{ const e=document.getElementById("ataSaved"); if(e) e.textContent="salvo"; }); },700);

/* =======================================================================
   VIEW: METODOLOGIA (Método PENSAR) — printável
   ======================================================================= */
function renderRoteiroDoc(arr){
  const g={}; arr.forEach(it=>{ (g[it.fase]=g[it.fase]||[]).push(it); });
  let out="";
  Object.keys(g).forEach(f=>{
    out+=`<div class="phase"><div class="phase-h"><span class="pensar-tag">${esc((f.split('—')[0]||f).trim().charAt(0))}</span>${esc(f)}</div>`;
    g[f].forEach(it=>{
      out+=`<div class="rit" style="cursor:default"><div style="flex:1;min-width:0">
        <div class="rtx"><b>${esc(it.titulo||it.texto||"")}</b></div>
        ${it.dica?`<div class="rdica">${esc(it.dica)}</div>`:''}
        ${(it.perguntas&&it.perguntas.length)?`<ul style="margin:7px 0 0;padding-left:18px">${it.perguntas.map(q=>`<li class="small">${esc(q)}</li>`).join("")}</ul>`:''}
      </div></div>`;
    });
    out+=`</div>`;
  });
  return out;
}

    <div class="callout small">O manual não é produzido apenas pela interpretação da Documentação. Ele é construído em conjunto com os responsáveis pelo processo e validado pelas áreas envolvidas. O nome <b>PENSAR</b> resume as seis etapas e a postura central: pensar como quem nunca viu a Círculo, a Lince ou o SINGE, porque é essa a pessoa que vai ler o manual.</div>

      <li><b>História antes da tela.</b> Primeiro o processo humano, do começo ao fim; só depois cruze com o sistema.</li>
      <li><b>As palavras deles, linguagem simples no manual.</b> Capture os termos reais e escreva em linguagem de negócio, sem códigos internos nem estruturas técnicas.</li>
      <li><b>Exemplos fictícios sempre (LGPD).</b> Nada de dados reais de funcionários nas anotações.</li>

function exportarBackup(){
  const blob=new Blob([JSON.stringify(State,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="backup_central_documentacao_"+ymd()+".json";
  a.click(); URL.revokeObjectURL(a.href);
  toast("Backup gerado.");
}
function importarBackup(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(!confirm("Importar vai SOBRESCREVER os dados atuais pela cópia do arquivo. Continuar?")) return;
      const payload={}; NODES.forEach(n=>payload[n]=d[n]||{});
      if(fbOK){ db.ref().set(payload).then(()=>toast("Backup importado.")); }
      else{ NODES.forEach(n=>State[n]=payload[n]); salvarLocal(); renderCurrent(); buildNav(); toast("Backup importado (local)."); }
    }catch(e){ toast("Arquivo inválido."); }
  };
  r.readAsText(file);
}
function restaurarLocal(){
  try{
    const j=localStorage.getItem(LOCAL_KEY); if(!j){ toast("Sem cópia local."); return; }
    if(!confirm("Restaurar a última cópia local vai sobrescrever a base atual. Continuar?")) return;
    const d=JSON.parse(j); const payload={}; NODES.forEach(n=>payload[n]=d[n]||{});
    if(fbOK) db.ref().set(payload).then(()=>toast("Cópia local restaurada."));
    else { NODES.forEach(n=>State[n]=payload[n]); renderCurrent(); buildNav(); toast("Restaurado."); }
  }catch(e){ toast("Falha ao restaurar."); }
}

function exportarAta(id){
  const r=get("reunioes",id); if(!r) return;
  const dec=lista("decisoes").filter(d=>d.reuniaoId===id);
  const pend=lista("pendencias").filter(p=>p.reuniaoId===id);
  let rot="";
  (r.roteiro||[]).forEach(it=>{
    const t=it.titulo||it.texto||"";
    rot+=`<li><b>${esc(t)}</b>`;
    if(Array.isArray(it.itens)&&it.itens.length){
      rot+=`<ul>`+it.itens.map(s=>`<li>[${s.feito?'x':' '}] ${esc(s.texto)}</li>`).join("")+`</ul>`;
    }
    if(it.nota) rot+=`<div style="color:#555;font-size:12.5px;margin:2px 0 6px">${esc(it.nota).replace(/\n/g,'<br>')}</div>`;
    rot+=`</li>`;
  });
  const html=`
    <h1>Ata — ${esc(r.titulo)}</h1>
    <p><b>Data:</b> ${r.dataHora?fmtDataHora(r.dataHora):'—'} &nbsp; <b>Tipo:</b> ${esc(r.tipo||'—')} &nbsp; <b>Status:</b> ${esc(r.status||'—')}</p>
    <p><b>Projeto:</b> ${esc(nomeProjeto(r.projetoId))} &nbsp; <b>Manual:</b> ${esc(tituloManual(r.manualId))}</p>
    <p><b>Participantes:</b> ${(r.participantes||[]).map(nomePessoa).join(", ")||'—'}</p>
    ${r.pauta?`<h3>Pauta</h3><p>${esc(r.pauta).replace(/\n/g,'<br>')}</p>`:''}
    ${r.notas?`<h3>Anotações</h3><p>${esc(r.notas).replace(/\n/g,'<br>')}</p>`:''}
    ${rot?`<h3>Roteiro percorrido</h3><ul>${rot}</ul>`:''}
    ${dec.length?`<h3>Decisões</h3><ul>${dec.map(d=>`<li>${esc(d.titulo)}${d.descricao?` — ${esc(d.descricao)}`:''}</li>`).join("")}</ul>`:''}
    ${pend.length?`<h3>Pendências</h3><ul>${pend.map(p=>`<li>${esc(p.titulo)} — ${esc(p.responsavelId?nomePessoa(p.responsavelId):'sem responsável')}${p.prazo?` (${fmtData(p.prazo)})`:''} — ${esc(p.status)}</li>`).join("")}</ul>`:''}
    <hr><p style="color:#888;font-size:12px">Gerado pela Central de Documentação em ${fmtDataHora(agora())}.</p>`;
  printHTML("Ata — "+r.titulo, html);
}

/* =======================================================================
   UI HELPERS
   ======================================================================= */
function esc(s){ s=(s==null?"":String(s)); return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function val(id){ const e=document.getElementById(id); return e?(e.value||""):""; }
function setVal(id,v){ const e=document.getElementById(id); if(e&&v!=null) e.value=v; }
function sel(id,opts,cur){ return `<select id="${id}">`+opts.map(o=>`<option ${o===cur?'selected':''}>${esc(o)}</option>`).join("")+`</select>`; }
function selId(id,arr,campo,cur){ return `<select id="${id}"><option value="">— nenhum —</option>`+arr.map(o=>`<option value="${o.id}" ${o.id===cur?'selected':''}>${esc(o[campo]||'')}</option>`).join("")+`</select>`; }
function checks(id,arr,marc){ if(!arr.length) return `<div class="small muted">Cadastre pessoas primeiro (aba Pessoas).</div>`;
  return `<div id="${id}" style="display:flex;flex-wrap:wrap;gap:8px">`+arr.map(o=>`<label style="display:flex;gap:6px;align-items:center;font-weight:600;background:var(--surface2);border:1px solid var(--line);padding:6px 10px;border-radius:9px;cursor:pointer;color:var(--ink)"><input type="checkbox" value="${o.id}" ${marc.includes(o.id)?'checked':''} style="width:16px;height:16px"> ${esc(o.nome)}</label>`).join("")+`</div>`; }
function getChecks(id){ const e=document.getElementById(id); if(!e) return []; return Array.from(e.querySelectorAll("input:checked")).map(i=>i.value); }
function toolbar(view,ph,right){ return `<div class="toolbar"><input class="search" placeholder="${ph}" value="${esc(filters[view]||'')}" oninput="setFilter('${view}',this.value)">${right||''}</div>`; }
function setFilter(view,v){ filters[view]=v; renderCurrent();
  const el=document.querySelector(".toolbar .search"); if(el){ el.focus(); const p=el.value.length; el.setSelectionRange(p,p);} }
function emptyBox(t,s,btn,fn){ return `<div class="empty"><div class="big">🗂️</div><div style="font-weight:700;color:var(--ink)">${t}</div><div class="small">${s||''}</div>${btn?`<div style="margin-top:12px"><button class="btn primary" onclick="${fn}">${btn}</button></div>`:''}</div>`; }

function fmtData(v){ if(!v) return "—"; const d = (typeof v==="number")?new Date(v):new Date(v+"T00:00:00"); return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"}); }
function fmtDataHora(ms){ return new Date(ms).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}); }
function toLocalInput(ms){ const d=new Date(ms); const p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`; }
function ymd(){ const d=new Date(),p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}`; }

/* modal */
function openModal(titulo, bodyHtml, onSubmit, submitLabel){
  const root=document.getElementById("modalRoot");
  root.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal"><div class="modal-h"><b>${esc(titulo)}</b><div class="spacer"></div><button class="iconbtn" onclick="closeModal()">✕</button></div>
    <div class="modal-b">${bodyHtml}</div>
    <div class="modal-f"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" id="modalSave">${submitLabel||'Salvar'}</button></div></div></div>`;
  document.getElementById("modalSave").onclick=()=>{ const r=onSubmit(); if(r!==false) closeModal(); };
}
function closeModal(){ document.getElementById("modalRoot").innerHTML=""; }

/* toast */
function toast(msg){
  const c=document.getElementById("toasts");
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  c.appendChild(t); setTimeout(()=>{ t.style.opacity="0"; t.style.transition="opacity .4s"; setTimeout(()=>t.remove(),400); },2600);
}

/* tema */
function applyTheme(m){ document.documentElement.setAttribute("data-theme",m); localStorage.setItem("centralDoc_theme",m); const b=document.getElementById("themeBtn"); if(b) b.textContent = m==="dark"?"☀":"◐"; }
function toggleTheme(){ applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark"); }

  const map={projetos:formProjeto,reunioes:formReuniao,manuais:formManual,pendencias:formPendencia,pessoas:formPessoa,telas:formTela};
